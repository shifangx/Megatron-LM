# Set A.2.3: Homogeneous TP8/DP1, Vision seq 4096
# Vision compute: ~25%, Expected colocated gain: 22-30%
# HIGH PRIORITY EXPERIMENT
# same tp, dp for both vision and language
# image_seq_length: 4096, tp: 8, dp: 1

model:
  module_architectures:
    images:
      seq_length: 4096
  
  module_parallelisms:
    images:
      tensor_parallel: 8
      pipeline_parallel: 1
      data_parallel: 1
    
    language_module:
      tensor_parallel: 8
      pipeline_parallel: 1
      data_parallel: 1
      

data:
  image_seq_length: 4096
  num_microbatches: 4

runtime:
  pipeline_schedule: "homogeneous"

