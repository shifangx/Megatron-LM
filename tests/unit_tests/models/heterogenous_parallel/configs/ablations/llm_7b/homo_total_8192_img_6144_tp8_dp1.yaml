# Set A.2.3: Homogeneous TP4/DP2, Vision seq 6144
# Vision compute: ~25%, Expected colocated gain: 22-30%
# HIGH PRIORITY EXPERIMENT
# same tp, dp for both vision and language
# image_seq_length: 6144, tp: 4, dp: 2

model:
  module_architectures:
    images:
      seq_length: 6144
  
  module_parallelisms:
    images:
      tensor_parallel: 8
      pipeline_parallel: 1
      data_parallel: 1
    
    language_module:
      tensor_parallel: 8
      pipeline_parallel: 1
      data_parallel: 1
      

data:
  image_seq_length: 6144
  num_microbatches: 8

runtime:
  pipeline_schedule: "homogeneous"

